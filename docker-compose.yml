services:
  # 1. FastAPI
  api_server:
    build:
      context: ./module_2_parser_db
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Общие данные
      - ${SHARED_DATA_ROOT}:/data
    depends_on:
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy

  # 2. Воркер
  worker:
    build:
      context: ./module_2_parser_db
      dockerfile: Dockerfile
    command: ["taskiq", "worker", "parser_db.broker:broker"]
    env_file:
      - .env
    volumes:
      - ${SHARED_DATA_ROOT}:/data
    depends_on:
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
    # проброс GPU
#    deploy:
#      resources:
#        reservations:
#          devices:
#            - driver: nvidia
#              count: all
#              capabilities: [gpu]

  # 3. Векторная БД Qdrant
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage

  # 4. Брокер
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  qdrant_data:
  redis_data: